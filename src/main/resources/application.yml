server:
  port: ${PORT:8080}

spring:
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 0
      maximum-pool-size: 3
      idle-timeout: 10000
      max-lifetime: 300000
      keepalive-time: 0
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

logging:
  level:
    com.airplanehome.flight: INFO

admin:
  api:
    token: ${ADMIN_API_TOKEN:}

app:
  exchange-rate:
    api-url: https://api.exchangerate-api.com/v4/latest/USD
    cache-duration-minutes: 60
    default-usd-to-krw-rate: 1450
    insecure-ssl: ${EXCHANGE_RATE_INSECURE_SSL:false}
  web:
    base-url: ${APP_BASE_URL:https://flight-platform.onrender.com}
    ga-id: ${GA_MEASUREMENT_ID:G-CH8DC6J7BZ}
    naver-analytics-id: ${NAVER_ANALYTICS_ID:9c84bd12437678}
  tracking:
    interval-ms: 300000
  on-demand:
    max-calls-per-minute: 6
  prefetch:
    interval-ms: 600000
    coverage-days-ahead: 7
    actual-fetch-offsets: 0,3
    round-trip-durations: 2,3,5,7
    routes-per-cycle: 5
    always-hot-routes: 2
    routes: ICN|NRT,ICN|FUK,ICN|KIX,ICN|TYO,ICN|CTS,ICN|OKA,ICN|BKK,ICN|HKG,ICN|TPE,ICN|SIN,ICN|DAD,ICN|SGN,ICN|MNL,ICN|CEB,ICN|SFO,ICN|LAX,ICN|JFK,ICN|SEA,ICN|YVR,ICN|GUM,ICN|SYD,ICN|MEL,ICN|CDG,ICN|LHR
  kakao:
    enabled: ${KAKAO_ENABLED:true}
    provider: ${KAKAO_PROVIDER:kakao-message-api}
    rest-api-key: ${KAKAO_REST_API_KEY:${KAKAO_API_KEY:}}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:${APP_BASE_URL:http://localhost:8080}/kakao-callback.html}
    api-key: ${KAKAO_API_KEY:}
    api-secret: ${KAKAO_API_SECRET:}
    sender-number: ${KAKAO_SENDER_NUMBER:}
    template-code: ${KAKAO_TEMPLATE_CODE:}
    service-id: ${KAKAO_SERVICE_ID:}
    plus-friend-id: ${KAKAO_PLUS_FRIEND_ID:}
    min-price-drop-krw: ${KAKAO_MIN_PRICE_DROP_KRW:10000}
    min-price-drop-percent: ${KAKAO_MIN_PRICE_DROP_PERCENT:5}

rapidapi:
  key: ${RAPIDAPI_KEY:}
  host: ${RAPIDAPI_HOST:flights-sky.p.rapidapi.com}
  auto-complete-url: ${RAPIDAPI_AUTOCOMPLETE_URL:https://flights-sky.p.rapidapi.com/web/flights/auto-complete}
  base-url: ${RAPIDAPI_BASE_URL:https://flights-sky.p.rapidapi.com/web/flights/search-one-way}
  round-trip-base-url: ${RAPIDAPI_ROUND_TRIP_BASE_URL:}
  market: ${RAPIDAPI_MARKET:US}
  locale: ${RAPIDAPI_LOCALE:en-US}
  currency: ${RAPIDAPI_CURRENCY:USD}
  insecure-ssl: ${RAPIDAPI_INSECURE_SSL:true}
  max-calls-per-hour: ${RAPIDAPI_MAX_CALLS_PER_HOUR:50}

duffel:
  enabled: ${DUFFEL_ENABLED:false}
  api-key: ${DUFFEL_API_KEY:}
  base-url: ${DUFFEL_BASE_URL:https://api.duffel.com}
  version: ${DUFFEL_VERSION:v2}
  insecure-ssl: ${DUFFEL_INSECURE_SSL:false}
  max-calls-per-hour: ${DUFFEL_MAX_CALLS_PER_HOUR:10}
