<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="ga">
  <th:block th:if="${gaId != null and !gaId.isEmpty()}">
    <script th:src="|https://www.googletagmanager.com/gtag/js?id=${gaId}|" async></script>
    <script th:inline="javascript">
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', /*[[${gaId}]]*/ '');
    </script>
  </th:block>
</th:block>
</body>
</html>
