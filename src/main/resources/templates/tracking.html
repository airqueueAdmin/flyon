<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle}">추적 목록</title>
  <meta name="description" th:content="${pageDescription}">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" th:href="${canonicalUrl}">
  <link rel="stylesheet" href="/app.css">
  <th:block th:replace="~{fragments/analytics :: ga}"></th:block>
</head>
<body data-page="tracking">
  <main class="shell">
    <section class="hero">
      <div class="page-top">
        <div>
          <span class="eyebrow">가격 추적</span>
          <h1>추적 목록</h1>
          <p id="tracking-focus" class="muted">추적 중인 노선을 확인할 수 있습니다.</p>
        </div>
        <a class="ghost-button" href="/">검색으로 돌아가기</a>
      </div>

      <div class="grid">
        <section class="tracking-panel">
          <div class="page-top">
            <div>
              <h2>추적 목록</h2>
              <p class="inline-note">이 화면에서는 현재 브라우저에 저장한 추적과 카카오에 연결된 추적만 보입니다. 추적을 삭제하면 관련 가격 이력과 함께 제거됩니다.</p>
            </div>
          </div>
          <div class="field-grid compact">
            <div class="field">
              <label for="tracking-origin-filter">출발지 필터</label>
              <select id="tracking-origin-filter" name="tracking-origin-filter"></select>
            </div>
            <div class="field">
              <label for="tracking-destination-filter">도착지 필터</label>
              <select id="tracking-destination-filter" name="tracking-destination-filter"></select>
            </div>
          </div>
          <div id="tracking-status" class="status"></div>
          <div id="tracking-list" class="tracking-list"></div>
        </section>

        <section class="example-card">
          <h2>카카오 알림 미리보기</h2>
          <p class="muted">카카오 로그인 연결 후 가격이 내려가면 이런 형태로 바로 확인할 수 있습니다.</p>
          <div id="kakao-example" class="message-preview"></div>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer" aria-label="사이트 정보">
    <div class="site-footer-card">
      <nav class="footer-nav">
        <a href="/">홈</a>
        <a href="/tracking.html">추적 목록</a>
        <a href="/deals.html">이번 주 딜</a>
        <a href="/about.html">소개</a>
        <a href="/privacy.html">개인정보처리방침</a>
        <a href="/terms.html">이용약관</a>
      </nav>
      <p class="footer-copyright">© 2026 플라이온. All rights reserved.</p>
    </div>
  </footer>

  <script src="/app.js"></script>
  <th:block th:replace="~{fragments/analytics :: naver}"></th:block>
</body>
</html>
