        options: [
          { key: "food",     emoji: "🍜", label: "맛집 & 쇼핑",  desc: "먹고 사는 낙" },
          { key: "culture",  emoji: "🏛️", label: "역사 & 문화",  desc: "보고 배우는 즐거움" },
          { key: "activity", emoji: "🤿", label: "액티비티",     desc: "몸으로 느끼는 여행" },

    const DESTINATIONS = [

        desc: "라멘, 모츠나베, 야타이 포장마차까지. 미식가를 위한 가성비 도시 여행.",

      },
      {

        desc: "트렌드의 최전선. 아키하바라부터 시부야까지, 며칠이라도 모자란 도시.",
        tags: ["도시 탐험", "쇼핑", "문화"],
        scores: { city:3, nature:0, beach:0, short:1, medium:3, long:1, near:3, sea:0, far:0, food:2, culture:2, activity:1 }
      },
      {
        code: "KIX", name: "오사카", country: "일본", emoji: "🏯",
        desc: "타코야키, 오코노미야키, 쿠시카츠. 교토도 당일치기 가능한 먹방 성지.",
        tags: ["먹방", "역사", "근거리"],
        scores: { city:3, nature:0, beach:0, short:2, medium:3, long:0, near:3, sea:0, far:0, food:3, culture:2, activity:0 }
      },
      {
        code: "CTS", name: "삿포로", country: "일본", emoji: "❄️",
        desc: "광활한 설원과 온천, 신선한 해산물. 자연 속에서 완전히 충전되는 여행.",
        tags: ["자연", "힐링", "액티비티"],
        scores: { city:1, nature:3, beach:0, short:1, medium:3, long:1, near:3, sea:0, far:0, food:2, culture:1, activity:3 }
      },
      {
        code: "OKA", name: "오키나와", country: "일본", emoji: "🐠",
        desc: "에메랄드 바다와 산호초, 류큐 문화. 일본에서 가장 따뜻한 섬.",
        tags: ["해변", "스노클링", "근거리"],
        scores: { city:1, nature:2, beach:3, short:2, medium:2, long:0, near:3, sea:0, far:0, food:1, culture:1, activity:3 }
      },
      {
        code: "BKK", name: "방콕", country: "태국", emoji: "🛕",
        desc: "화려한 왕궁, 길거리 음식 천국, 활기찬 야시장. 모든 게 다 있는 도시.",

      },
      {
        code: "DAD", name: "다낭", country: "베트남", emoji: "🌊",
        desc: "미케 비치의 새하얀 모래사장, 호이안 구시가지, 합리적인 물가.",
        tags: ["해변", "문화", "동남아"],

      {

        desc: "세계적인 다이빙 포인트, 고래상어 투어, 투명한 바닷물. 액티비티 천국.",
        tags: ["해변", "다이빙", "액티비티"],
        scores: { city:0, nature:2, beach:3, short:1, medium:3, long:1, near:0, sea:3, far:0, food:1, culture:1, activity:3 }
      },
      {
        code: "CDG", name: "파리", country: "프랑스", emoji: "🥐",
        desc: "에펠탑, 루브르, 마카롱. 한 번쯤은 꼭 가야 할 낭만의 도시.",
        tags: ["문화", "예술", "유럽"],
        scores: { city:3, nature:0, beach:0, short:0, medium:1, long:3, near:0, sea:0, far:3, food:2, culture:3, activity:1 }
      },
      {
        code: "JFK", name: "뉴욕", country: "미국", emoji: "🗽",
        desc: "타임스퀘어, 센트럴파크, 브로드웨이. 잠들지 않는 도시의 에너지.",
        tags: ["도시", "문화", "미주"],
        scores: { city:3, nature:0, beach:0, short:0, medium:1, long:3, near:0, sea:0, far:3, food:2, culture:3, activity:1 }
      },
      {
        code: "SYD", name: "시드니", country: "호주", emoji: "🦘",
        desc: "오페라하우스, 본다이 비치, 블루마운틴. 도시와 자연이 완벽하게 공존.",
        tags: ["자연", "도시", "오세아니아"],
        scores: { city:2, nature:2, beach:2, short:0, medium:1, long:3, near:0, sea:0, far:3, food:1, culture:2, activity:3 }
      },
    ];

    const wrap = document.getElementById("quiz-wrap");
    let answers = [];
    let current = 0;

    function render() {
      if (current < QUESTIONS.length) {
        renderQuestion(current);
      } else {
        renderResult();
      }
    }

    function renderQuestion(idx) {
      const q = QUESTIONS[idx];
      const progress = Math.round((idx / QUESTIONS.length) * 100);
      wrap.innerHTML = `
        <div class="quiz-progress-wrap">
          <div class="quiz-progress-bar" style="width:${progress}%"></div>
        </div>
        <p class="quiz-step-label">${idx + 1} / ${QUESTIONS.length}</p>
        <h2 class="quiz-question-text">${q.text}</h2>
        <div class="quiz-options">
          ${q.options.map(opt => `
            <button class="quiz-option" data-key="${opt.key}">
              <span class="quiz-option-emoji">${opt.emoji}</span>
              <div class="quiz-option-text">
                <span class="quiz-option-label">${opt.label}</span>
                <span class="quiz-option-desc">${opt.desc}</span>
              </div>
            </button>
          `).join("")}
        </div>
      `;
      wrap.querySelectorAll(".quiz-option").forEach(btn => {
        btn.addEventListener("click", () => {
          answers.push(btn.dataset.key);
          current++;
          render();
        });
      });
    }

    function renderResult() {
      const totals = {};
      DESTINATIONS.forEach(d => { totals[d.code] = 0; });
      answers.forEach(ans => {
        DESTINATIONS.forEach(d => { totals[d.code] += d.scores[ans] || 0; });
      });
      const best = DESTINATIONS.reduce((a, b) => totals[a.code] >= totals[b.code] ? a : b);

      wrap.innerHTML = `
        <div class="quiz-result">
          <p class="quiz-result-label">딱 맞는 여행지는</p>
          <div class="quiz-result-card">
            <div class="quiz-result-emoji">${best.emoji}</div>
            <div class="quiz-result-name">${best.name}</div>
            <div class="quiz-result-country">${best.country}</div>
            <div class="quiz-result-tags">
              ${best.tags.map(t => `<span class="quiz-tag">${t}</span>`).join("")}
            </div>
            <p class="quiz-result-desc">${best.desc}</p>
            <a class="button" href="/?origin=ICN&destination=${best.code}">지금 항공권 검색하기</a>
          </div>
          <button class="ghost-button quiz-retry">다시 하기</button>
        </div>
      `;
      wrap.querySelector(".quiz-retry").addEventListener("click", () => {
        answers = [];
        current = 0;
        render();
      });
    }

    render();
  </script>
</body>
