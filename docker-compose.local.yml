services:
  postgres:
    image: postgres:16-alpine
    container_name: flight-platform-postgres
    environment:
      POSTGRES_DB: flight_platform
      POSTGRES_USER: flight
      POSTGRES_PASSWORD: flight
    ports:
      - "5432:5432"
    volumes:
      - flight-platform-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight -d flight_platform"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: flight-platform-local
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/flight_platform
      DB_USERNAME: flight
      DB_PASSWORD: flight
      RAPIDAPI_HOST: ${RAPIDAPI_HOST:-flights-sky.p.rapidapi.com}
      RAPIDAPI_INSECURE_SSL: ${RAPIDAPI_INSECURE_SSL:-true}
      DUFFEL_INSECURE_SSL: ${DUFFEL_INSECURE_SSL:-true}
      EXCHANGE_RATE_INSECURE_SSL: ${EXCHANGE_RATE_INSECURE_SSL:-true}
    ports:
      - "8080:8080"

volumes:
  flight-platform-postgres-data:
